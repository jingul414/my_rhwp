name: "Build and Release RHWP Desktop"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 1. 코드 체크아웃 (서브모듈 포함)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: 2. 서브모듈 초기화 및 업데이트
        run: |
          git submodule init
          git submodule update --recursive

      - name: 3. 리눅스 빌드 의존성 설치 (apt 캐시 적용)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev mold
          version: 1.0

      - name: 4. Node.js 세팅
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 5. Rust 세팅
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: 6. Rust 빌드 캐시 (Tauri + rhwp WASM 중간 산출물)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            src-rhwp

      - name: 7. WASM pkg 캐시 확인
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: src-rhwp/pkg
          key: wasm-pkg-${{ hashFiles('src-rhwp/src/**', 'src-rhwp/Cargo.toml', 'src-rhwp/Cargo.lock') }}

      - name: 8. wasm-pack 설치 (캐시 미스 시만)
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: 9. wasm-pack 빌드 (캐시 미스 시만)
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: wasm-pack build src-rhwp --target web

      - name: 10. 루트 패키지 설치 (@tauri-apps/cli 포함)
        run: npm ci

      - name: 10-1. upstream rhwp 릴리즈 노트 가져오기
        if: "${{ github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore: update src-rhwp to latest upstream') }}"
        id: upstream-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git -C src-rhwp fetch --tags origin

          UPSTREAM_SHA="$(git -C src-rhwp rev-parse --short HEAD)"
          UPSTREAM_TAG="$(git -C src-rhwp describe --tags --exact-match 2>/dev/null || true)"
          UPSTREAM_URL="https://github.com/edwardkim/rhwp/commit/${UPSTREAM_SHA}"
          RELEASE_BODY=""

          if [ -n "$UPSTREAM_TAG" ]; then
            UPSTREAM_URL="https://github.com/edwardkim/rhwp/releases/tag/${UPSTREAM_TAG}"
            API_URL="https://api.github.com/repos/edwardkim/rhwp/releases/tags/${UPSTREAM_TAG}"
            RELEASE_JSON="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "$API_URL" || true)"

            if [ -n "$RELEASE_JSON" ]; then
              RELEASE_BODY="$(printf '%s' "$RELEASE_JSON" | jq -r '.body // empty')"
            fi
          fi

          {
            echo "tag=${UPSTREAM_TAG:-untagged}"
            echo "sha=${UPSTREAM_SHA}"
            echo "url=${UPSTREAM_URL}"
            echo 'body<<UPSTREAM_RELEASE_NOTES_EOF'
            if [ -n "$RELEASE_BODY" ]; then
              printf '%s\n' "$RELEASE_BODY"
            else
              echo "upstream GitHub Release 노트를 찾지 못했습니다. 자세한 내용은 ${UPSTREAM_URL} 를 확인하세요."
            fi
            echo 'UPSTREAM_RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: 10-2. 릴리즈 변경 내역 생성
        id: changelog
        env:
          IS_UPSTREAM_AUTO_UPDATE: "${{ github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore: update src-rhwp to latest upstream') }}"
          UPSTREAM_TAG: ${{ steps.upstream-notes.outputs.tag }}
          UPSTREAM_SHA: ${{ steps.upstream-notes.outputs.sha }}
          UPSTREAM_URL: ${{ steps.upstream-notes.outputs.url }}
          UPSTREAM_RELEASE_BODY: ${{ steps.upstream-notes.outputs.body }}
        run: |
          HEAD_SUBJECT="$(jq -r '.head_commit.message // "" | split("\n")[0]' "$GITHUB_EVENT_PATH")"

          {
            echo 'body<<CHANGELOG_EOF'
            echo "자동 빌드된 리눅스용 설치 파일(.deb)입니다."
            echo ""

            if [ "${IS_UPSTREAM_AUTO_UPDATE}" = "true" ]; then
              echo "## 변경 내역"
              echo "- ${HEAD_SUBJECT:-chore: update src-rhwp to latest upstream}"
              echo ""
              echo "---"
              echo ""
              echo "## 서브모듈의 릴리즈 노트"
              echo ""
              echo "- 버전/태그: ${UPSTREAM_TAG}"
              echo "- 커밋: ${UPSTREAM_SHA}"
              echo "- 링크: ${UPSTREAM_URL}"
              echo ""
              printf '%s\n' "${UPSTREAM_RELEASE_BODY}"
            else
              echo "## 변경 내역"
              COMMIT_LINES="$(jq -r '.commits[]?.message | split("\n")[0] | select(length > 0) | "- " + .' "$GITHUB_EVENT_PATH" 2>/dev/null || true)"
              if [ -n "$COMMIT_LINES" ]; then
                printf '%s\n' "$COMMIT_LINES"
              else
                git log -n 3 --no-merges --pretty=format:"- %s"
              fi
            fi

            echo ""
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: 11. Tauri 앱 빌드 및 Release 업로드
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v0.1.0-${{ github.run_number }}
          releaseName: "RHWP Desktop Build #${{ github.run_number }}"
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --bundles deb
