name: "Build and Release RHWP Desktop"

on:
  schedule:
    - cron: '0 0 * * *' # 매일 자정(UTC 기준)에 원본 업데이트를 확인하고 빌드합니다.
  workflow_dispatch: # GitHub 웹사이트에서 내가 원할 때 'Run workflow' 버튼을 눌러 수동으로 실행할 수 있습니다.

jobs:
  build:
    runs-on: ubuntu-latest # 리눅스 환경에서 빌드

    steps:
      - name: 1. 내 코드와 서브모듈 가져오기
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0 # 전체 히스토리를 가져와 서브모듈 동기화 오류 방지

      - name: 2. 서브모듈 강제 초기화 및 업데이트
        run: |
          git submodule init
          git submodule update --recursive

      - name: 3. 리눅스 앱 개발용 필수 패키지 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: 4. Node.js 세팅 (웹 화면용)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 5. Rust 세팅 (백엔드 코어용)
        uses: dtolnay/rust-toolchain@stable

      - name: 6. 프론트엔드 패키지 설치
        # 주의: package.json이 있는 폴더 위치에 따라 'npm install' 실행 경로를 수정해야 할 수 있습니다.
        run: npm install 

      - name: 7. Tauri 앱 빌드 및 Release에 업로드
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 깃허브가 자동으로 부여하는 권한 키
        with:
          tagName: v0.1.0-${{ github.run_number }} # 빌드될 때마다 번호가 올라감
          releaseName: "RHWP Linux Build - 실행 횟수: #${{ github.run_number }}"
          releaseBody: "원본 코드가 업데이트되어 자동으로 생성된 리눅스용 설치 파일(.deb)입니다."
          releaseDraft: false
          prerelease: false
