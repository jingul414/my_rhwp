name: "Build and Release RHWP Desktop"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 코드 체크아웃 (서브모듈 포함)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: 2. 서브모듈 초기화 및 업데이트
        run: |
          git submodule init
          git submodule update --recursive

      - name: 3. 리눅스 빌드 의존성 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: 4. Node.js 세팅
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 5. Rust 세팅
        uses: dtolnay/rust-toolchain@stable

      - name: 6. Rust 빌드 캐시
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 7. 프론트엔드 패키지 설치
        run: npm install

      - name: 8. Tauri 앱 빌드 및 Release 업로드
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v0.1.0-${{ github.run_number }}
          releaseName: "RHWP Desktop Build #${{ github.run_number }}"
          releaseBody: "자동 빌드된 리눅스용 설치 파일(.deb)입니다."
          releaseDraft: false
          prerelease: false
          args: --bundles deb
