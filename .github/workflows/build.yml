name: "Build and Release RHWP Desktop"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 1. 코드 체크아웃 (서브모듈 포함)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: 2. 서브모듈 초기화 및 업데이트
        run: |
          git submodule init
          git submodule update --recursive

      - name: 3. 리눅스 빌드 의존성 설치 (apt 캐시 적용)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
          version: 1.0

      - name: 4. Node.js 세팅
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 5. Rust 세팅
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: 6. Rust 빌드 캐시 (Tauri + rhwp WASM 중간 산출물)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            src-rhwp

      - name: 7. WASM pkg 캐시 확인
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: src-rhwp/pkg
          key: wasm-pkg-${{ hashFiles('src-rhwp/src/**', 'src-rhwp/Cargo.toml', 'src-rhwp/Cargo.lock') }}

      - name: 8. wasm-pack 설치 (캐시 미스 시만)
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: 9. wasm-pack 빌드 (캐시 미스 시만)
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: wasm-pack build src-rhwp --target web

      - name: 10. 루트 패키지 설치 (@tauri-apps/cli 포함)
        run: npm ci

      - name: 11. Tauri 앱 빌드 및 Release 업로드
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v0.1.0-${{ github.run_number }}
          releaseName: "RHWP Desktop Build #${{ github.run_number }}"
          releaseBody: "자동 빌드된 리눅스용 설치 파일(.deb)입니다."
          releaseDraft: false
          prerelease: false
          args: --bundles deb
